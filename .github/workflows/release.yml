name: Auto Release Publish

on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a version tag like v1.0.0

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to create releases and upload files

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Change this if your project uses Java 8, 11, 21, etc.
          distribution: 'temurin'
          cache: 'gradle' # Automatically caches Gradle files for faster builds

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Extract Version String from Tag
        id: get_version
        run: |
          # Strips the 'v' from the tag name (e.g., converts 'v1.0.0' into '1.0.0')
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compile and Build Executable JAR
        # Passes the dynamic version directly to your Gradle build pipeline
        run: ./gradlew clean build -Pversion=${{ steps.get_version.outputs.version }}

      - name: Create GitHub Release and Upload JAR
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # Auto-generates changelogs from commits
          files: |
            build/libs/Netron-Merged-${{ steps.get_version.outputs.version }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
