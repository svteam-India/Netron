name: Auto Release Publish

on:
  push:
    tags:
      - '[0-9]*' # Triggers on tags starting with a number (like 1.0, 2.0.4, etc.)

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to publish the release and attach your JAR

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Change this if your project uses Java 8, 11, or 21
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Compile and Build Executable JAR
        # Passes the exact tag name directly to Gradle as the version
        run: ./gradlew clean build -Pversion=${{ github.ref_name }}

      - name: Create GitHub Release and Upload JAR
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/libs/*.jar # This will find and upload the JAR automatically
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

